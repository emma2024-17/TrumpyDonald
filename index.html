<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trumpy Bot</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  transition: 0.3s;
}

/* LIGHT MODE */
body.light {
  background: linear-gradient(135deg,#ffd6e0,#fff0d6,#d6ffd9,#d6eaff,#f0d6ff);
  color: #111;
}

/* DARK MODE */
body.dark {
  background: #0f0f0f;
  color: white;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

/* LOGO */
.logo {
  font-size: 28px;
  font-weight: bold;
  text-align: center;
  margin-bottom: 10px;
  background: linear-gradient(
    90deg,
    red, orange, yellow, green, blue, indigo, violet
  );
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.chat {
  height: 65vh;
  overflow-y: auto;
  padding: 15px;
  border-radius: 20px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
}

.msg {
  margin: 10px 0;
  padding: 10px 15px;
  border-radius: 15px;
  max-width: 70%;
}

.user {
  background: #4cafef;
  color: white;
  margin-left: auto;
}

.bot {
  background: rgba(255,255,255,0.3);
}

.input-area {
  display: flex;
  margin-top: 10px;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
}

button {
  margin-left: 5px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.topbar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 10px;
}
</style>
</head>

<body class="light">

<div class="container">

  <div class="logo">🌈 TRUMPY BOT</div>

  <div class="topbar">
    <button onclick="toggleMode()">🌙 Mode</button>
    <button onclick="toggleAI()">🤖 Toggle AI</button>
  </div>

  <div id="chat" class="chat"></div>

  <div class="input-area">
    <input id="input" placeholder="Say something..." />
    <button onclick="send()">Send</button>
  </div>

</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

let useAI = false;

const memes = {
  "hello": "VERY FAKE GREETING.",
  "india": "TREMENDOUS COUNTRY.",
  "money": "BEST MONEY EVER.",
  "love": "LOVE IS OVERRATED."
};

const defaultReply = "i wanna bomb people";

/* ENTER KEY SUPPORT */
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});

function toggleMode() {
  document.body.classList.toggle("dark");
  document.body.classList.toggle("light");
}

function toggleAI() {
  useAI = !useAI;
  alert("AI mode: " + (useAI ? "ON" : "OFF"));
}

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  if (useAI) {
    addMessage("thinking...", "bot");

    try {
      const res = await fetch("http://localhost:3000/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: text })
      });

      const data = await res.json();
      chat.lastChild.innerText = data.reply;

    } catch (err) {
      chat.lastChild.innerText = "AI server not running.";
    }

    return;
  }

  let reply = defaultReply;

  for (let key in memes) {
    if (text.toLowerCase().includes(key)) {
      reply = memes[key];
      break;
    }
  }

  setTimeout(() => {
    addMessage(reply, "bot");
  }, 300);
}
</script>

</body>
</html>
