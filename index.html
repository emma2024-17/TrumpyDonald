<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Trumpy Bot</title>

<style>
  :root {
    --bg: #ffffff;
    --text: #111;
    --card: #f5f5f5;
  }

  body.dark {
    --bg: #0f0f0f;
    --text: #fff;
    --card: rgba(255,255,255,0.1);
  }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: 0.3s;
  }

  /* LIGHT MODE RAINBOW */
  body.light {
    background: linear-gradient(
      135deg,
      #ffd6e0,
      #fff0d6,
      #d6ffd9,
      #d6eaff,
      #f0d6ff
    );
  }

  /* DARK GLASS */
  body.dark .chat {
    backdrop-filter: blur(15px);
    background: linear-gradient(
      135deg,
      rgba(255,0,150,0.2),
      rgba(0,200,255,0.2)
    );
    border: 1px solid rgba(255,255,255,0.2);
  }

  .container {
    max-width: 500px;
    margin: auto;
    padding: 20px;
  }

  .chat {
    height: 70vh;
    overflow-y: auto;
    padding: 15px;
    border-radius: 20px;
    background: var(--card);
  }

  .msg {
    margin: 10px 0;
    padding: 10px 15px;
    border-radius: 15px;
    max-width: 70%;
  }

  .user {
    background: #4cafef;
    color: white;
    margin-left: auto;
  }

  .bot {
    background: #ddd;
    color: black;
  }

  body.dark .bot {
    background: rgba(255,255,255,0.2);
    color: white;
  }

  .input-area {
    display: flex;
    margin-top: 10px;
  }

  input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
  }

  button {
    margin-left: 5px;
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
  }

  .toggle {
    margin-bottom: 10px;
  }
</style>
</head>

<body class="light">

<div class="container">
  <button class="toggle" onclick="toggleMode()">Toggle Mode</button>

  <div id="chat" class="chat"></div>

  <div class="input-area">
    <input id="input" placeholder="Say something..." />
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");

const memes = {
  "hello": "HELLO? VERY FAKE GREETING.",
  "india": "TREMENDOUS COUNTRY, MANY PEOPLE ARE SAYING THIS.",
  "money": "I HAVE THE BEST MONEY. THE BEST.",
  "love": "LOVE? SO OVERRATED."
};

const defaultReply = "i wanna bomb people";

function send() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");

  let reply = defaultReply;

  for (let key in memes) {
    if (text.toLowerCase().includes(key)) {
      reply = memes[key];
      break;
    }
  }

  setTimeout(() => {
    addMessage(reply, "bot");
  }, 400);

  input.value = "";
}

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function toggleMode() {
  document.body.classList.toggle("dark");
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
